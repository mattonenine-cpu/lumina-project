<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <defs>
    <filter id="grainDark" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.11" numOctaves="5" seed="7" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feComponentTransfer in="g" result="grain">
        <feFuncA type="gamma" amplitude="1" exponent="3.2" offset="0"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="baseDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f1d11"/>
      <stop offset="0.5" stop-color="#26160c"/>
      <stop offset="1" stop-color="#1c1008"/>
    </linearGradient>
  </defs>
  <rect width="700" height="500" fill="url(#baseDark)"/>
  <rect width="700" height="500" filter="url(#grainDark)" fill="#0c0704" opacity="0.55"/>
  <rect width="700" height="500" filter="url(#grainDark)" fill="#5a3418" opacity="0.18"/>
</svg>
