<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <defs>
    <filter id="grainLight" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005 0.09" numOctaves="5" seed="21" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feComponentTransfer in="g" result="grain">
        <feFuncA type="gamma" amplitude="1" exponent="3.6" offset="0"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="baseLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e6d2"/>
      <stop offset="1" stop-color="#e9d8bf"/>
    </linearGradient>
  </defs>
  <rect width="700" height="500" fill="url(#baseLight)"/>
  <rect width="700" height="500" filter="url(#grainLight)" fill="#b08a5c" opacity="0.20"/>
  <rect width="700" height="500" filter="url(#grainLight)" fill="#8a6236" opacity="0.08"/>
</svg>
